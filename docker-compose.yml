services:
  web:
    build:
      context: .
      args:
        # VITE_* must be available at BUILD time so Vite inlines them into
        # the client bundle. Values are read from the shell / .env.production
        # on the host (docker compose auto-loads .env in the project dir).
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
    container_name: mk-site
    restart: unless-stopped
    ports:
      - "80:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
